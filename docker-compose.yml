services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: interviewiq
      POSTGRES_PASSWORD: interviewiq
      POSTGRES_DB: interviewiq
    ports:
      - "5432:5432"
    volumes:
      - interviewiq_pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  interviewiq_pg_data:
